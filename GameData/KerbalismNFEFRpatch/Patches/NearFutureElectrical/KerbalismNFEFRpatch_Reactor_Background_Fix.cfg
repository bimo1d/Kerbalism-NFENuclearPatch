// KerbalismNFEFRpatch reactor bridge mode:
// Keep Kerbalism _Nukereactor process for background simulation,
// but make it non-user-toggleable. Runtime sync is handled by plugin.

@PART[nfe-reactor-*]:NEEDS[NearFutureElectrical,ProfileDefault]:AFTER[zzzKerbalismDefault]
{
	@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]
	{
		%running = true
		%toggle = false
		// 2 = dump XenonGas only, keep DepletedFuel in tank.
		%valve_i = 2
	}
}

// Match Kerbalism process capacity to current NFE reactor outputs:
// Kerbalism _Nukereactor outputs 10 EC/s per 1.0 capacity.
@PART[nfe-reactor-tiny-1]:NEEDS[NearFutureElectrical,ProfileDefault]:AFTER[zzzKerbalismDefault]
{
	@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]
	{
		@capacity = 0.5
	}
}
